defaults:
  - data: igsm
  - _self_

run_name: sent_lm
seed: 1
device: cuda

model:
  d_model: 256
  chunk_layers: 2
  chunk_heads: 4
  state_layers: 4
  state_heads: 8
  dec_layers: 2
  dec_heads: 4
  ff_mult: 4
  max_chunk_len: 48
  max_chunks: 64
  latent_target: false

train:
  batch_size: 128
  num_workers: 8
  epochs: 20
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_steps: 1000
  grad_clip: 5.0
  log_every: 50

hydra:
  run:
    dir: runs/${run_name}
  output_subdir: null
  job:
    chdir: false
