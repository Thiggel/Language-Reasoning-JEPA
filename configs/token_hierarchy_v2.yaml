defaults:
  - data: igsm
  - _self_

run_name: hard_hier_v2_l1_s8_d32
seed: 0
device: cuda:0

model:
  d_model: 256
  encoder_layers: 4
  predictor_layers: 2
  n_heads: 8
  ff_mult: 4
  max_len: 512
  d_action: 64
  level_spans: [8]
  level_dims: [32]
  variational_levels: [false]
  phase_augmented_levels: [false]
  concat_width: 8
  low_dense_depth: 4
  high_dense_depth: 4
  use_token_prior: false
  token_prior_hidden: 0
  token_prior_detach_state: false
  distinct_level_states: false
  level_state_encoder_layers: 2

objective:
  low_prediction: 1.0
  low_dense: 1.0
  # Deprecated legacy normalized-position target. Keep the head loadable for
  # checkpoint compatibility, but never enable it in non-symbolic research.
  low_value: 0.0
  goal_prediction: 1.0
  high_prediction: 1.0
  high_dense: 1.0
  # Per-level multipliers, from the shortest to the longest macro horizon.
  # A single value is broadcast to every active level.
  high_level_weights: [1.0]
  reachability: 0.25
  # Deprecated legacy normalized-position target; see ``low_value``.
  high_value: 0.0
  macro_prior: 0.05
  support: 0.1
  vicreg: 1.0
  covariance: 0.04
  dense_discount: 0.7
  # Optional level-specific overrides. Null preserves dense_discount.
  low_dense_discount: null
  high_dense_discount: null
  token_prior: 0.0
  token_prior_rollout: 0.0
  token_prior_rollout_discount: 0.7
  token_prior_label_smoothing: 0.0
  # End-to-end geometric advantage ranking (GAR). Candidate outcomes are
  # EMA-encoded same-prefix counterfactual token sequences; no symbolic
  # remaining-step or feasibility label enters the preference target.
  geo_rank_low: 0.0
  geo_rank_high: 0.0
  geo_rank_level_weights: [1.0]
  geo_rank_k: 2
  # Optional primitive/macro overrides. A single legacy value still
  # broadcasts when these are null.
  geo_rank_low_k: null
  geo_rank_high_k: null
  geo_rank_horizon: 2
  # Optional primitive/macro overrides. Null preserves geo_rank_horizon.
  geo_rank_low_horizon: null
  geo_rank_high_horizon: null
  geo_rank_continuations: 2
  # random: full-vocabulary negatives; prior/mixed: planner-supported hard negatives.
  geo_rank_primitive_proposals: random
  # sampled takes the best exact outcome among sampled continuation sequences.
  # oracle_beam searches prior-supported continuations by exact EMA goal distance.
  geo_rank_low_policy: sampled
  geo_rank_beam_width: 4
  geo_rank_beam_branch: 4
  geo_rank_macro_proposals: global
  geo_rank_conditional_k: 32
  geo_rank_margin: 0.5
  geo_rank_label_gap: 0.02
  geo_rank_objective: pairwise
  geo_rank_pairwise: 1.0
  geo_rank_temperature: 0.1
  geo_rank_regression: 0.0
  geo_rank_detach_prediction: false

train:
  batch_size: 24
  num_workers: 8
  epochs: 10
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_steps: 300
  grad_clip: 5.0
  ema_start: 0.99
  ema_end: 0.999
  log_every: 50
  eval_batches: 40

hydra:
  run:
    dir: runs/${run_name}
  output_subdir: null
  job:
    chdir: false
