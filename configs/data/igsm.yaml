name: igsm
modulus: 23
n_vars_range: [6, 12]
leaf_prob: 0.35
steps_range: [3, 9]
distractor_prob: 0.15
max_distractors: 2
train_size: 100000
val_size: 5000
test_size: 5000
train_seed: 1
val_seed: 2
test_seed: 3
shuffle_actions: false
n_alt: 0
geo_rank_k: 0
geo_rank_horizon: 1
geo_rank_rollouts: 1
geo_rank_policy: random  # random | greedy; greedy is selected online in EMA geometry
geo_rank_beam_width: 1   # bounded geometry-greedy continuation; 1 = ordinary greedy
macro_alt_k: 0
macro_alt_horizon: 3
all_action_supervision: false
fresh_per_epoch: true
