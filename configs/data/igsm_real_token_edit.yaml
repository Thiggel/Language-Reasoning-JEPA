name: igsm_real_token_edit
modulus: 23
max_op: 21
max_edge: 28
op_range: [8, 21]
train_size: 6000
val_size: 1000
test_size: 1000
train_seed: 1
val_seed: 2
test_seed: 3
fresh_per_epoch: true
min_edits: 6
max_edits: 16
# Exact mechanically executed alternatives from the current buffer only.
# They carry outcome buffers but no target-relative quality label.
counterfactual_k: 0
# Opt-in broad target-independent pool for adaptive GAR hard-negative mining.
# The model scores all actions cheaply and executes/encodes only selected_k.
proposal_pool_k: 0
proposal_token_pool: current_buffer  # current_buffer | prompt_plus_current
counterfactual_source: uniform_local
gar_teacher: latent_distance
# Opt-in frozen-policy state replay. A positive fraction replaces expert
# presentations; dataset length and optimizer updates remain unchanged.
replay_path: null
replay_fraction: 0.0
replay_proposal_seed: 3700
corruption_mode: mixed  # mixed | mask | replace | remove | curriculum
curriculum_epochs: 3
# Compatibility fields unused by the text-only corruption process.
n_vars_range: [6, 12]
leaf_prob: 0.35
steps_range: [3, 9]
distractor_prob: 0.0
max_distractors: 0
shuffle_actions: false
n_alt: 0
