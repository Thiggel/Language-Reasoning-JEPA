defaults:
  - data: igsm
  - _self_

run_name: sentence_hierarchy
seed: 0
device: cuda:0
boundary_mode: semantic

model:
  d_low: 256
  d_high: 192
  encoder_layers: 4
  high_encoder_layers: 4
  predictor_layers: 2
  n_heads: 8
  ff_mult: 4
  max_len: 768
  d_token_action: 64
  d_macro: 32
  macro_layers: 2
  macro_hidden: 128
  macro_heads: 4
  low_dense_depth: 2
  high_dense_depth: 2
  separate_high_encoder: true
  use_token_prior: true
  token_prior_hidden: 0
  token_prior_detach_state: false

objective:
  low_prediction: 1.0
  low_dense: 1.0
  low_value: 0.25
  low_goal: 1.0
  token_prior: 1.0
  high_prediction: 1.0
  high_dense: 1.0
  high_goal: 1.0
  high_value: 1.0
  high_level_weight: 1.0
  macro_prior: 0.05
  support: 0.1
  bridge: 0.25
  transition_reachability: 0.25
  reachability_classifier: 0.1
  vicreg_low: 1.0
  vicreg_high: 1.0
  covariance: 0.04
  dense_discount: 0.7
  temporal_straightening: 0.0
  value_monotonicity: 0.0
  monotonicity_margin: 0.0
  gar_weight: 0.0
  gar_k: 4
  gar_source: in_batch
  gar_regression: 1.0
  gar_ranking: 1.0
  gar_margin: 0.1
  gar_counterfactual_mse: 0.25

train:
  batch_size: 16
  num_workers: 0
  epochs: 3
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_steps: 200
  grad_clip: 5.0
  ema_start: 0.99
  ema_end: 0.999
  log_every: 50
  eval_batches: 20

hydra:
  run:
    dir: runs/${run_name}
  output_subdir: null
  job:
    chdir: false
