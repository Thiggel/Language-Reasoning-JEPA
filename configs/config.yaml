defaults:
  - data: igsm
  - model: discourse
  - objective: discourse
  - _self_

run_name: dev
seed: 0
device: cuda:0
allow_legacy_predictor: false

train:
  init_ckpt: null
  init_mode: low_level  # low_level | full
  reset_hi_predictor: false
  reset_macro_value_head: false
  freeze_low_level: false
  train_high_level: true
  train_hi_predictor: false
  train_hi_value_head: false
  train_subgoal_action_head: false
  train_macro_value_head: false
  train_low_predictor: false
  train_low_value_head: false
  batch_size: 128
  num_workers: 8
  epochs: 20
  lr: 3e-4
  weight_decay: 0.05
  warmup_steps: 1000
  grad_clip: 5.0
  ema_start: 0.99
  ema_end: 0.999
  log_every: 50
  eval_batches: 40

hydra:
  run:
    dir: runs/${run_name}
  job:
    chdir: false
