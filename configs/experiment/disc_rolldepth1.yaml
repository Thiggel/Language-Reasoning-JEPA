# @package _global_
# Supervision-horizon ablation: rollout loss limited to the first 1
# open-loop step (default recipe supervises the full trace).
run_name: disc_rolldepth1
model:
  chunk_target: frozen
  value_detach: false
objective:
  chunk_pred: {weight: 2.0}
  rollout: {weight: 1.0, max_depth: 1}
