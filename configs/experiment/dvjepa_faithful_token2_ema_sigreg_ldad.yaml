# @package _global_
defaults:
  - override /data: igsm_real
  - override /model: discourse_vjepa
  - override /objective: discourse_vjepa

# Matched official-iGSM ordered-token action cell with faithful raw intent
# reconstruction from s_{t+1}-s_t. It differs from the accompanying no-LDAD
# cell only by the decoder and reconstruction loss.
run_name: dvjepa_faithful_token2_ema_sigreg_ldad
model:
  max_chunk_len: 96
  target_mode: ema
  action_mode: token_bottleneck
  action_token_dim: 2
  predictor_residual: true
  observed_action_ldad: true
objective:
  action_kl: {weight: 0.0, free_nats: 4.0}
  vicreg: {weight: 0.0}
  sigreg: {weight: 0.01}
  observed_action_ldad: {weight: 1.0}
data: {train_size: 30000, val_size: 2000}
train: {epochs: 10}
