# @package _global_
defaults:
  - override /data: igsm_real
  - override /model: discourse_vjepa
  - override /objective: discourse_vjepa

# Official-iGSM VICReg residual-predictor control. Together with the adjacent
# LDAD-on cell, this isolates the regularizer under the transition
# parameterization that currently gives the most accurate conditional mean.
run_name: dvjepa_faithful_pooled_ema_vicreg
model:
  max_chunk_len: 96
  target_mode: ema
  action_mode: pooled
  predictor_residual: true
  observed_action_ldad: false
objective:
  action_kl: {weight: 0.0, free_nats: 4.0}
  vicreg: {weight: 1.0}
  sigreg: {weight: 0.0}
  observed_action_ldad: {weight: 0.0}
data: {train_size: 30000, val_size: 2000}
train: {epochs: 10}
