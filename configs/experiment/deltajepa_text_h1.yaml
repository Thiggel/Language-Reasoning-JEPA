# @package _global_
defaults:
  - override /objective: discourse_observed_ldad

# Core adjacent-state LDAD: reconstruct the externally observed intent phrase
# from s_{t+1}-s_t using only latent MSE + raw-action token reconstruction.
run_name: deltajepa_text_h1
model:
  state_target: online_nosg
  observed_action_ldad: true
  observed_action_ldad_horizon: 1
  predictor_residual: true
objective:
  latent_pred: {weight: 1.0, kind: mse, norm_targets: false}
  observed_action_ldad: {weight: 1.0}
  vicreg: {weight: 0.0}
  sigreg: {weight: 0.0}
data:
  train_size: 30000
  val_size: 2000
train:
  epochs: 10
