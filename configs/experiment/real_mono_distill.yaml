# @package _global_
# FAITHFUL iGSM: non-symbolic value head (hinge + distilled V).
defaults:
  - override /data: igsm_real
run_name: real_mono_distill
model:
  chunk_target: frozen
  max_chunk_len: 96
  value_detach: false
objective:
  chunk_pred: {weight: 2.0}
  monotone: {weight: 2.0, margin: 0.05}
  value: {weight: 0.0}
  value_distill: {weight: 1.0}
