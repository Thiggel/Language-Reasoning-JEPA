# @package _global_
# Delta-JEPA-style end-to-end target: no EMA, no stop-gradient, no VICReg.
# Compared with the noldad counterpart, observed-action LDAD is the only
# changed component. Planning hierarchy/rollout remain enabled; this is not
# the paper's minimal two-loss recipe because the planning objectives remain.
run_name: disc_gar_greedy_h2_k2_ldad_online
model:
  chunk_target: frozen
  value_detach: false
  state_target: online_nosg
  observed_action_ldad: true
objective:
  chunk_pred: {weight: 2.0}
  counterfactual_outcome: {weight: 2.0}
  ranking: {weight: 0.0}
  value: {weight: 0.0}
  delta_action: {weight: 0.0}
  observed_action_ldad: {weight: 0.2}
  vicreg: {weight: 0.0}
  monotone: {weight: 2.0, margin: 0.05, label_free: true}
  value_distill: {weight: 1.0}
  geo_rank: {weight: 1.0}
data: {n_alt: 2, geo_rank_k: 2, geo_rank_horizon: 2, geo_rank_policy: greedy}
