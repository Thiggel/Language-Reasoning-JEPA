# @package _global_
# Slot-aligned edit predictor: per-slot outcome anchor (predict the
# frozen anchor embedding of the CHANGED sentence) replaces the pooled
# buffer-level anchor — the audited-bottleneck fix (matching 0.43 vs 1.0).
defaults:
  - override /data: igsm_edit
  - override /model: edit
run_name: edit_core5_slot
model:
  chunk_target: frozen
  value_detach: false
data:
  vandal_prob: 0.25
  max_vandal: 2
  n_alt: 4
objective:
  rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  chunk_pred: {weight: 0.0}
  slot_anchor: {weight: 2.0}
  value: {weight: 0.0}
  ranking: {weight: 1.0}
train:
  batch_size: 64
