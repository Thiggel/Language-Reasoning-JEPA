# @package _global_
# K=2 counterfactual outcome prediction without scalar progress regression.
# V distills label-free goal geometry; hybrid displacement labels remain.
run_name: disc_cfout_k2_geodist
model:
  chunk_target: frozen
  value_detach: false
objective:
  chunk_pred: {weight: 2.0}
  counterfactual_outcome: {weight: 2.0}
  ranking: {weight: 0.0}
  value: {weight: 0.0}
  monotone: {weight: 2.0, margin: 0.05, label_free: true}
  value_distill: {weight: 1.0}
data:
  n_alt: 2
