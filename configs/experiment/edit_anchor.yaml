# @package _global_
# Edit track with the frozen outcome anchor (predict frozen random-init
# buffer embedding of the post-edit buffer) + value-shaped encoder +
# extra vandal-edit negatives. Ports the discourse collusion fix.
defaults:
  - override /data: igsm_edit
  - override /model: edit

run_name: edit_anchor
model:
  chunk_target: frozen
  value_detach: false
data:
  vandal_prob: 0.25
  max_vandal: 2
objective:
  chunk_pred:
    weight: 2.0
train:
  batch_size: 64
