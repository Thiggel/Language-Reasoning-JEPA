# @package _global_
defaults:
  - override /model: discourse_vjepa
  - override /objective: discourse_vjepa

# Faithful raw-action LDAD counterpart for the EMA+VICReg direct predictor.
run_name: dvjepa_pooled_ema_vicreg_direct_ldad
model:
  target_mode: ema
  action_mode: pooled
  predictor_residual: false
  observed_action_ldad: true
objective:
  action_kl: {weight: 0.0, free_nats: 4.0}
  vicreg: {weight: 1.0}
  sigreg: {weight: 0.0}
  observed_action_ldad: {weight: 1.0}
data: {train_size: 30000, val_size: 2000}
train: {epochs: 10}
