# @package _global_
# Distill K-step macro cost with an explicit early-progress tie-break.  This
# trains only Q_hi(s,m); dynamics, encoders, and other heads remain frozen.
run_name: intent_macro_receding_value_tail79

model:
  macro_k: 3
  d_macro: 32
  macro_encoder_kind: transformer
  macro_variational: false
  high_predictor_kind: causal
  high_predictor_layers: 2
  high_predictor_heads: 8
  high_predictor_ff_mult: 4
  high_predictor_residual: false
  dense_rollout_depth: 4
  predictor_residual: false

objective:
  latent_pred: {weight: 0.0}
  rollout: {weight: 0.0}
  dense_rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  macro_prior: {weight: 0.0}
  vicreg: {weight: 0.0}
  delta_action: {weight: 0.0}
  value: {weight: 0.0}
  macro_receding_value:
    weight: 1.0
    discount: 0.5
    tie_break_scale: 1.0
  macro_receding_rank:
    weight: 1.0
    discount: 0.5
    margin: 0.2

data:
  n_vars_range: [8, 14]
  steps_range: [7, 9]
  train_size: 12000
  val_size: 1000
  macro_alt_k: 8
  macro_alt_horizon: 3
  n_alt: 0
  geo_rank_k: 0

train:
  init_ckpt: runs/intent_lodense_tail79_n4/best.pt
  init_mode: full
  freeze_low_level: true
  train_high_level: false
  train_macro_value_head: true
  batch_size: 128
  num_workers: 4
  epochs: 3
  lr: 3e-4
  warmup_steps: 50
  eval_batches: 8
