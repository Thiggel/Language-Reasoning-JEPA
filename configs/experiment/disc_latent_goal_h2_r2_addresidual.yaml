# @package _global_
# Exact round-two architecture add-back around the reduced non-symbolic model.
# The reference predicts the complete next state directly; this control uses
# \hat{s}_{t+1}=s_t+F(s_t,a_t) while holding every objective and GAR setting
# fixed.
run_name: disc_latent_goal_h2_r2_addresidual
model:
  chunk_target: frozen
  value_detach: false
  observed_action_ldad: false
  predictor_residual: true
objective:
  rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  chunk_pred: {weight: 2.0}
  counterfactual_outcome: {weight: 0.0}
  ranking: {weight: 0.0}
  value: {weight: 0.0}
  delta_action: {weight: 0.0}
  observed_action_ldad: {weight: 0.0}
  monotone: {weight: 0.0, margin: 0.05, label_free: true}
  value_distill: {weight: 0.0}
  geo_rank: {weight: 1.0}
data:
  n_alt: 0
  geo_rank_k: 2
  geo_rank_horizon: 2
  geo_rank_policy: greedy
