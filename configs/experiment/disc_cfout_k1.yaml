# @package _global_
# Counterfactual-data control: predict one observed alternative outcome per
# visited state, but provide no preference/ranking label.
run_name: disc_cfout_k1
model:
  chunk_target: frozen
  value_detach: false
objective:
  chunk_pred: {weight: 2.0}
  counterfactual_outcome: {weight: 2.0}
  ranking: {weight: 0.0}
data:
  n_alt: 1
