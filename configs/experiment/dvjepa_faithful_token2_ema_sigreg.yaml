# @package _global_
defaults:
  - override /data: igsm_real
  - override /model: discourse_vjepa
  - override /objective: discourse_vjepa

# Official-iGSM action-representation transfer. Ordered intent-token
# embeddings retain two dimensions per token before fixed-order
# concatenation and projection to the same 16-dimensional action code used
# by the pooled control. This cell omits raw-action reconstruction.
run_name: dvjepa_faithful_token2_ema_sigreg
model:
  max_chunk_len: 96
  target_mode: ema
  action_mode: token_bottleneck
  action_token_dim: 2
  predictor_residual: true
  observed_action_ldad: false
objective:
  action_kl: {weight: 0.0, free_nats: 4.0}
  vicreg: {weight: 0.0}
  sigreg: {weight: 0.01}
  observed_action_ldad: {weight: 0.0}
data: {train_size: 30000, val_size: 2000}
train: {epochs: 10}
