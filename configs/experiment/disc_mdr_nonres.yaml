# @package _global_
# MDR ablation: non-residual predictor (the grid says non-residual >=
# residual and makes LDAD redundant on combo — does it help MDR too?).
run_name: disc_mdr_nonres
model:
  chunk_target: frozen
  value_detach: false
  predictor_residual: false
