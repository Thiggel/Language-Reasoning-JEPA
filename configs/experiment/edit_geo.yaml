# @package _global_
# Edit track + both geometry regularizers (mild straightening 0.02 +
# monotonicity 1.0) on top of the edit_anchor recipe.
defaults:
  - override /data: igsm_edit
  - override /model: edit

run_name: edit_geo
model:
  chunk_target: frozen
  value_detach: false
data:
  vandal_prob: 0.25
  max_vandal: 2
objective:
  chunk_pred: {weight: 2.0}
  straighten: {weight: 0.02}
  monotone: {weight: 1.0}
train:
  batch_size: 64
