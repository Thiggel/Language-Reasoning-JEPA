# @package _global_
# Stability ablation for the hybrid displacement loss alone —
# not a faithful raw-action Delta-JEPA replication. NO stability mechanisms:
# no EMA teacher (online targets), no stopgrad on the target side, no
# VICReg. This tests whether the hybrid objective alone prevents collapse.
run_name: disc_ldad_pure
model:
  state_target: online_nosg
objective:
  vicreg: {weight: 0.0}
