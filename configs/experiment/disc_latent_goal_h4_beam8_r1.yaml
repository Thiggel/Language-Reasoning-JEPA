# @package _global_
# Bounded-beam preference-teacher test around the reduced non-symbolic model.
# Relative to disc_latent_goal_h2_r1, only the environment continuation used
# to construct geometric preferences changes: H=4 and beam width B=8 replace
# H=2 greedy continuation. No symbolic quality annotations enter the beam.
run_name: disc_latent_goal_h4_beam8_r1
model:
  chunk_target: frozen
  value_detach: false
  observed_action_ldad: false
  predictor_residual: false
objective:
  rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  chunk_pred: {weight: 2.0}
  counterfactual_outcome: {weight: 0.0}
  ranking: {weight: 0.0}
  value: {weight: 0.0}
  delta_action: {weight: 0.0}
  observed_action_ldad: {weight: 0.0}
  monotone: {weight: 0.0, margin: 0.05, label_free: true}
  value_distill: {weight: 0.0}
  geo_rank: {weight: 1.0}
data:
  n_alt: 0
  geo_rank_k: 2
  geo_rank_horizon: 4
  geo_rank_policy: greedy
  geo_rank_beam_width: 8
