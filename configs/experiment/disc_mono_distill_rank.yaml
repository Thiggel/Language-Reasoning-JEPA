# @package _global_
# The binary-tier champion candidate: monotonicity hinge (shapes metric) +
# V distilled from that metric + counterfactual ranking (binary relevance
# comparisons) — NO scalar remaining-steps regression anywhere. If this
# approaches disc_champion (0.905), scalar value labels are dispensable.
run_name: disc_mono_distill_rank
model:
  chunk_target: frozen
  value_detach: false
objective:
  chunk_pred: {weight: 2.0}
  monotone: {weight: 2.0, margin: 0.05}
  value: {weight: 0.0}
  value_distill: {weight: 1.0}
  ranking: {weight: 1.0}
data:
  n_alt: 2
