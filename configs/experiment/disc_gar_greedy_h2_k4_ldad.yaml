# @package _global_
# Geometry-greedy H=2 with four alternative root actions.  Matched to the
# full H2/K2 configuration except for GAR candidate density.
run_name: disc_gar_greedy_h2_k4_ldad
model:
  chunk_target: frozen
  value_detach: false
  observed_action_ldad: true
objective:
  chunk_pred: {weight: 2.0}
  counterfactual_outcome: {weight: 2.0}
  ranking: {weight: 0.0}
  value: {weight: 0.0}
  delta_action: {weight: 0.0}
  observed_action_ldad: {weight: 0.2}
  monotone: {weight: 2.0, margin: 0.05, label_free: true}
  value_distill: {weight: 1.0}
  geo_rank: {weight: 1.0}
data:
  n_alt: 2
  geo_rank_k: 4
  geo_rank_horizon: 2
  geo_rank_policy: greedy
