# @package _global_
# Faithful iGSM at the OFFICIAL hard settings (max_op 21, max_edge 28).
defaults:
  - override /data: igsm_real
run_name: real_rank_hard
model:
  chunk_target: frozen
  value_detach: false
  max_chunk_len: 96
objective:
  chunk_pred: {weight: 2.0}
  ranking: {weight: 1.0}
data:
  n_alt: 2
  max_op: 21
  max_edge: 28
  op_range: [3, 21]
