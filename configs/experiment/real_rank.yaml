# @package _global_
# Faithful iGSM + counterfactual ranking: the diagnosed fix (probes
# healthy, energy near-random — the pre-ranking signature).
defaults:
  - override /data: igsm_real
run_name: real_rank
model:
  chunk_target: frozen
  value_detach: false
  max_chunk_len: 96
objective:
  chunk_pred: {weight: 2.0}
  ranking: {weight: 1.0}
data:
  n_alt: 2
