# @package _global_
# Explicit terminal-privileged synthetic control. Proposal selection sees only
# learned V(s,a); exact boundary-token edit advantages are gathered afterward.
defaults: [edit_token_structured_gar_adaptive_hard, _self_]
run_name: edit_token_structured_gar_adaptive_exact
data:
  gar_teacher: token_edit_distance
  # Pilot width: P=64 increased full-shape generation time by 44% and
  # quadruples broad outcome tensors; scale only if P=16 proposal recall fails.
  proposal_pool_k: 16
objective:
  gar_action_value:
    weight: 1.0
    teacher: token_edit_distance
