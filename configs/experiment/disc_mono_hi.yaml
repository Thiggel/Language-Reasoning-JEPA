# @package _global_
# Stronger goal-monotonicity: weight 2.0, margin 0.05. disc_mono (1.0/0.02)
# saturates its hinge early (loss ~0.003) at goal_dist_corr 0.73; push the
# margin to force a steeper, more discriminative goal-distance gradient.
run_name: disc_mono_hi
model:
  chunk_target: frozen
  value_detach: false
objective:
  chunk_pred: {weight: 2.0}
  monotone: {weight: 2.0, margin: 0.05}
