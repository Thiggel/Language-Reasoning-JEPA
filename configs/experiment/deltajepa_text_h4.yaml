# @package _global_
defaults:
  - override /objective: discourse_observed_ldad

# Multi-step LDAD extension: reconstruct four ordered observed intent phrases
# from the single long-horizon displacement s_{t+4}-s_t.
run_name: deltajepa_text_h4
model:
  state_target: online_nosg
  observed_action_ldad: true
  observed_action_ldad_horizon: 4
  predictor_residual: true
objective:
  latent_pred: {weight: 1.0, kind: mse, norm_targets: false}
  observed_action_ldad: {weight: 1.0}
  vicreg: {weight: 0.0}
  sigreg: {weight: 0.0}
data:
  train_size: 30000
  val_size: 2000
train:
  epochs: 10
