# @package _global_
# Faithful easy-project hierarchy repair: a K-stride causal macro model plus
# valid counterfactual macro chunks, exact cost-to-go, and support learning.
run_name: intent_hier_repair
model:
  macro_k: 3
  d_macro: 32
  macro_encoder_kind: transformer
  macro_variational: false
  macro_concat_width: 8
  high_predictor_kind: causal
  high_predictor_layers: 2
  high_predictor_heads: 8
  high_predictor_ff_mult: 4
  high_predictor_residual: false
  predictor_residual: false
  value_detach: true
  observed_action_ldad: false
objective:
  latent_pred: {weight: 0.0, kind: smooth_l1, norm_targets: true}
  rollout: {weight: 0.0, kind: smooth_l1, norm_targets: true}
  dense_rollout: {weight: 0.0, kind: smooth_l1, norm_targets: true, horizon_discount: 1.0}
  hierarchy: {weight: 1.0, kind: smooth_l1, norm_targets: true}
  macro_prior: {weight: 0.01, free_nats: 0.0}
  hierarchy_value: {weight: 0.0, scale: 5.0}
  vicreg: {weight: 0.0, std_target: 1.0, cov_weight: 0.04, action_weight: 0.1}
  delta_action: {weight: 0.0, ce_weight: 1.0, emb_weight: 1.0}
  observed_action_ldad: {weight: 0.0}
  value: {weight: 0.0}
  chunk_pred: {weight: 0.0, rollout_weight: 0.5}
  straighten: {weight: 0.0}
  monotone:
    weight: 0.0
    margin: 0.02
    distractor_weight: 0.5
    label_free: true
  value_distill: {weight: 0.0, scale: 5.0}
  ranking: {weight: 0.0, margin: 0.5}
  cost_ranking: {weight: 0.0, margin: 0.5}
  slot_anchor: {weight: 0.0}
  action_kl: {weight: 0.0, free_nats: 0.0}
  act_decode: {weight: 0.0}
  geo_rank: {weight: 0.0, margin: 0.5, label_gap: 0.02}
  counterfactual_outcome: {weight: 0.0}
  macro_cf_dynamics: {weight: 0.0, kind: smooth_l1, norm_targets: true}
  lower_hierarchy_rollout: {weight: 0.0, kind: smooth_l1, norm_targets: true}
  macro_state_value: {weight: 0.0}
  macro_action_value: {weight: 0.0}
  macro_advantage_rank: {weight: 0.0, margin: 0.5}
  macro_ood_value_rank: {weight: 0.0, margin: 1.0}
  subgoal_action_rank: {weight: 0.0, temperature: 1.0, predicted_weight: 1.0}
  macro_top1_rank: {weight: 0.0, temperature: 1.0}
  macro_receding_value: {weight: 0.0, discount: 0.5, tie_break_scale: 0.1}
  macro_receding_rank: {weight: 0.0, discount: 0.5, margin: 0.2}
  macro_support:
    weight: 0.0
    shuffled_weight: 1.0
    perturbed_weight: 1.0
  action_feasibility: {weight: 0.0, positive_weight: 2.0}
data:
  train_size: 40000
  val_size: 3000
  macro_alt_k: 8
  macro_alt_horizon: 3
  geo_rank_k: 0
  n_alt: 0
train:
  init_ckpt: runs/disc_latent_goal_h2_r1/best.pt
  freeze_low_level: true
  train_low_predictor: false
  train_low_value_head: false
  epochs: 15
  warmup_steps: 300
