# @package _global_
# ANNOTATION-FREE recipe: every training signal is trace text, geometry,
# or environment interaction with geometric labels. No symbolic counts,
# no binary relevance flags. latent_pred + VICReg + anchor + LDAD +
# label-free hinge + distilled V + geometric-advantage ranking.
run_name: disc_georank
model:
  chunk_target: frozen
  value_detach: false
objective:
  rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  chunk_pred: {weight: 2.0}
  monotone: {weight: 2.0, margin: 0.05, label_free: true}
  value: {weight: 0.0}
  value_distill: {weight: 1.0}
  geo_rank: {weight: 1.0}
data:
  geo_rank_k: 2
