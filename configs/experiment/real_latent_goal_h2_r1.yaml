# @package _global_
# Official-iGSM transfer pilot of the reduced stylized non-symbolic model.
# It uses direct one-step latent prediction, on-trajectory outcome prediction
# with its internal predicted-outcome rollout, VICReg, EMA targets, and H=2/K=2
# multi-step latent-goal preference distillation. It uses no symbolic quality
# labels, LDAD, monotonicity, hierarchy, explicit open-loop latent loss, scalar
# value regression, counterfactual transition auxiliary, or residual skip.
defaults:
  - override /data: igsm_real

run_name: real_latent_goal_h2_r1
model:
  chunk_target: frozen
  value_detach: false
  max_chunk_len: 96
  observed_action_ldad: false
  predictor_residual: false
objective:
  rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  chunk_pred: {weight: 2.0}
  counterfactual_outcome: {weight: 0.0}
  ranking: {weight: 0.0}
  value: {weight: 0.0}
  delta_action: {weight: 0.0}
  observed_action_ldad: {weight: 0.0}
  monotone: {weight: 0.0, margin: 0.05, label_free: true}
  value_distill: {weight: 0.0}
  geo_rank: {weight: 1.0}
data:
  n_alt: 0
  geo_rank_k: 2
  geo_rank_horizon: 2
  geo_rank_policy: greedy
