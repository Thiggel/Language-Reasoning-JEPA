# @package _global_
# Non-symbolic token-edit JEPA over official full/hard iGSM text.
defaults:
  - override /data: igsm_real_token_edit
  - override /model: edit
run_name: edit_token_faithful_base
model:
  max_chunk_len: 128
  predictor_kind: causal
  high_predictor_kind: causal
  predictor_residual: false
  macro_k: 0
  chunk_target: frozen
  value_detach: false
  observed_action_ldad: true
objective:
  latent_pred: {weight: 1.0}
  rollout: {weight: 0.0}
  dense_rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  high_dense_rollout: {weight: 0.0}
  vicreg: {weight: 1.0}
  delta_action: {weight: 0.0}
  observed_action_ldad: {weight: 0.2}
  value: {weight: 0.0}
  chunk_pred: {weight: 2.0, rollout_weight: 0.5}
  value_distill: {weight: 1.0}
  ranking: {weight: 0.0}
  cost_ranking: {weight: 0.0}
  geo_rank: {weight: 0.0}
  monotone: {weight: 0.0}
  straighten: {weight: 0.0}
train:
  batch_size: 16
  num_workers: 0
  epochs: 3
  warmup_steps: 100
  eval_batches: 20
