# @package _global_
defaults:
  - override /model: discourse_vjepa
  - override /objective: discourse_vjepa

# Exact direct-predictor counterpart to the pooled EMA+VICReg factorial cell.
# Together with the LDAD-on condition this tests whether the state-rank gain
# from removing the residual skip is specific to SIGReg.
run_name: dvjepa_pooled_ema_vicreg_direct
model:
  target_mode: ema
  action_mode: pooled
  predictor_residual: false
  observed_action_ldad: false
objective:
  action_kl: {weight: 0.0, free_nats: 4.0}
  vicreg: {weight: 1.0}
  sigreg: {weight: 0.0}
  observed_action_ldad: {weight: 0.0}
data: {train_size: 30000, val_size: 2000}
train: {epochs: 10}
