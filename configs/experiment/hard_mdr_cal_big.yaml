# @package _global_
# Scale-up wave 1: final recipe on the hard domain at d_model 512 (~35M)
# — does capacity move the deep-chain frontier?
defaults:
  - override /data: igsm_hard
run_name: hard_mdr_cal_big
model:
  chunk_target: frozen
  value_detach: false
  d_model: 512
objective:
  chunk_pred: {weight: 2.0}
  monotone: {weight: 2.0, margin: 0.05}
  value: {weight: 0.0}
  value_distill: {weight: 1.0}
  ranking: {weight: 1.0}
  cost_ranking: {weight: 1.0}
data:
  n_alt: 2
train:
  batch_size: 64
