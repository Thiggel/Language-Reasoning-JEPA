# @package _global_
# MDR ablation: remove distillation — V is trained by ranking margins
# alone (scale-free value head).
run_name: disc_mono_rank
model:
  chunk_target: frozen
  value_detach: false
objective:
  chunk_pred: {weight: 2.0}
  monotone: {weight: 2.0, margin: 0.05}
  value: {weight: 0.0}
  value_distill: {weight: 0.0}
  ranking: {weight: 1.0}
data:
  n_alt: 2
