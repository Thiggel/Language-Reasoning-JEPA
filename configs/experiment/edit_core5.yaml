# @package _global_
# Edit-track shear: mirror of disc_core5 — latent prediction + ranking +
# VICReg + anchor + LDAD, V from ranking margins (no defect-count labels).
defaults:
  - override /data: igsm_edit
  - override /model: edit
run_name: edit_core5
model:
  chunk_target: frozen
  value_detach: false
data:
  vandal_prob: 0.25
  max_vandal: 2
  n_alt: 4
objective:
  rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  chunk_pred: {weight: 2.0}
  value: {weight: 0.0}
  ranking: {weight: 1.0}
train:
  batch_size: 64
