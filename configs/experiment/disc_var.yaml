# @package _global_
# CAPSTONE: variational unobserved actions. Posterior q(a|s,s') infers
# 16-d codes from transitions; prior p(a|s) proposes at plan time; KL
# regularized; detached readout decodes codes to intent-anchor embeddings
# for execution matching. No intent phrases as inputs anywhere.
run_name: disc_var
model:
  chunk_target: frozen
  value_detach: false
  variational_actions: true
objective:
  rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  delta_action: {weight: 0.0}
  chunk_pred: {weight: 2.0}
  action_kl: {weight: 0.1}
  act_decode: {weight: 1.0}
