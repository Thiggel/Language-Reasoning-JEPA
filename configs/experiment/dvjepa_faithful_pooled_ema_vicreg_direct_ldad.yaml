# @package _global_
defaults:
  - override /data: igsm_real
  - override /model: discourse_vjepa
  - override /objective: discourse_vjepa

# Matched official direct-predictor VICReg cell with faithful reconstruction
# of every observed intent token from s_{t+1}-s_t.
run_name: dvjepa_faithful_pooled_ema_vicreg_direct_ldad
model:
  max_chunk_len: 96
  target_mode: ema
  action_mode: pooled
  predictor_residual: false
  observed_action_ldad: true
objective:
  action_kl: {weight: 0.0, free_nats: 4.0}
  vicreg: {weight: 1.0}
  sigreg: {weight: 0.0}
  observed_action_ldad: {weight: 1.0}
data: {train_size: 30000, val_size: 2000}
train: {epochs: 10}
