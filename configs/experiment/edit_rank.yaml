# @package _global_
# Edit track + counterfactual ranking over K=4 candidate edits: hinge-rank
# by post-edit defect count. Directly attacks the value-tie /
# slack-insensitivity failure.
defaults:
  - override /data: igsm_edit
  - override /model: edit
run_name: edit_rank
model:
  chunk_target: frozen
  value_detach: false
data:
  vandal_prob: 0.25
  max_vandal: 2
  n_alt: 4
objective:
  chunk_pred: {weight: 2.0}
  ranking: {weight: 1.0}
train:
  batch_size: 64
