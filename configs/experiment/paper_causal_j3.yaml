# @package _global_
# Frozen causal-transformer flat JEPA reference for the paper rerun.
run_name: paper_causal_j3
model:
  predictor_kind: causal
  predictor_layers: 2
  predictor_heads: 8
  predictor_residual: false
  high_predictor_kind: causal
  macro_k: 0
  chunk_target: frozen
  value_detach: false
  observed_action_ldad: false
  dense_rollout_depth: 0
objective:
  latent_pred: {weight: 1.0}
  rollout: {weight: 0.0}
  dense_rollout: {weight: 0.0}
  hierarchy: {weight: 0.0}
  high_dense_rollout: {weight: 0.0}
  vicreg: {weight: 1.0}
  delta_action: {weight: 0.0}
  observed_action_ldad: {weight: 0.0}
  value: {weight: 0.0}
  chunk_pred: {weight: 2.0, rollout_weight: 0.5}
  counterfactual_outcome: {weight: 0.0}
  straighten: {weight: 0.0}
  monotone: {weight: 0.0}
  value_distill: {weight: 0.0}
  ranking: {weight: 0.0}
  cost_ranking: {weight: 0.0}
  geo_rank: {weight: 1.0}
data:
  shuffle_actions: true
  n_alt: 0
  geo_rank_k: 2
  geo_rank_horizon: 2
  geo_rank_policy: greedy

