<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Recursive token error across learning rates</title>
  <desc id="desc">Recursive error falls smoothly from 0.941 at one millionth to 0.182 at three ten-thousandths. The three-seed range at the final learning rate is only 0.182 to 0.190.</desc>
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="bold" fill="#17324d">Larger updates keep improving the selected edit model</text>
  <text x="500" y="68" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#486581">Same recipe, data, schedule, and seed except for the three-seed endpoint</text>
  <line x1="95" y1="455" x2="930" y2="455" stroke="#486581" stroke-width="2"/><line x1="95" y1="100" x2="95" y2="455" stroke="#486581" stroke-width="2"/>
  <g font-family="sans-serif" font-size="14" fill="#486581">
    <line x1="95" y1="420" x2="930" y2="420" stroke="#d9e2ec"/><text x="82" y="425" text-anchor="end">0.2</text><line x1="95" y1="340" x2="930" y2="340" stroke="#d9e2ec"/><text x="82" y="345" text-anchor="end">0.4</text><line x1="95" y1="260" x2="930" y2="260" stroke="#d9e2ec"/><text x="82" y="265" text-anchor="end">0.6</text><line x1="95" y1="180" x2="930" y2="180" stroke="#d9e2ec"/><text x="82" y="185" text-anchor="end">0.8</text><line x1="95" y1="100" x2="930" y2="100" stroke="#d9e2ec"/><text x="82" y="105" text-anchor="end">1.0</text><text transform="translate(28 285) rotate(-90)" text-anchor="middle" font-size="17">Recursive token error (lower is better)</text>
  </g>
  <polyline points="115,124 275,161 345,249 395,294 455,303 615,338 685,362 735,373 795,386 915,427" fill="none" stroke="#247ba0" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#247ba0" stroke="#ffffff" stroke-width="3"><circle cx="115" cy="124" r="7"/><circle cx="275" cy="161" r="7"/><circle cx="345" cy="249" r="7"/><circle cx="395" cy="294" r="7"/><circle cx="455" cy="303" r="7"/><circle cx="615" cy="338" r="7"/><circle cx="685" cy="362" r="7"/><circle cx="735" cy="373" r="7"/><circle cx="795" cy="386" r="7"/><circle cx="915" cy="427" r="8"/></g>
  <line x1="915" y1="424" x2="915" y2="427" stroke="#d1495b" stroke-width="9" stroke-linecap="round"/><text x="900" y="405" text-anchor="end" font-family="sans-serif" font-size="15" fill="#d1495b">3-seed range: 0.182–0.190</text>
  <g font-family="sans-serif" font-size="13" fill="#486581"><text x="115" y="480" text-anchor="middle">1e-6</text><text x="275" y="480" text-anchor="middle">3e-6</text><text x="395" y="480" text-anchor="middle">7e-6</text><text x="455" y="480" text-anchor="middle">1e-5</text><text x="615" y="480" text-anchor="middle">3e-5</text><text x="735" y="480" text-anchor="middle">7e-5</text><text x="795" y="480" text-anchor="middle">1e-4</text><text x="915" y="480" text-anchor="middle">3e-4</text><text x="512" y="525" text-anchor="middle" font-size="17">Peak learning rate (log spacing)</text></g>
  <text x="175" y="145" font-family="sans-serif" font-size="16" fill="#17324d">Undertraining</text><text x="750" y="320" font-family="sans-serif" font-size="16" fill="#17324d">Still improving at boundary</text>
</svg>
