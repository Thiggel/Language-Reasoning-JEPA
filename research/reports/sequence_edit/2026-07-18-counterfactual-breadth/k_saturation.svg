  <text x="28" y="30" font-family="sans-serif" font-size="18">Matched token error (lower is better)</text>
  <line x1="70" y1="185" x2="650" y2="185" stroke="#555"/><line x1="70" y1="50" x2="70" y2="185" stroke="#555"/>
  <polyline points="90,75 250,145 430,145 610,145" fill="none" stroke="#4c78a8" stroke-width="4"/>
  <g fill="#4c78a8"><circle cx="90" cy="75" r="7"/><circle cx="250" cy="145" r="7"/><circle cx="430" cy="145" r="7"/><circle cx="610" cy="145" r="7"/></g>
  <g font-family="sans-serif" font-size="15" text-anchor="middle"><text x="90" y="210">K=0</text><text x="250" y="210">K=1</text><text x="430" y="210">K=4</text><text x="610" y="210">K=8</text></g>
