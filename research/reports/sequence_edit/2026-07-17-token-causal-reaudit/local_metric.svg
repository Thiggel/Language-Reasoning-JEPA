<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-label="A local edit is diluted by global averaging">
  <rect width="720" height="180" fill="#fff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="18">One edit in a long token sequence</text>
  <g transform="translate(25 65)">
    <rect width="660" height="38" rx="6" fill="#d9e3ea"/>
    <rect x="300" width="55" height="38" fill="#ef8354"/>
    <line x1="327" y1="38" x2="327" y2="72" stroke="#333" stroke-width="2"/>
    <text x="260" y="98" font-family="sans-serif" font-size="15">score this local window too</text>
  </g>
  <text x="25" y="160" font-family="sans-serif" font-size="14" fill="#555">Global averaging is appropriate for length changes, but dilutes replacement content.</text>
</svg>
