<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Ranking improves while valid execution remains zero</title>
  <desc id="desc">A blue line for terminal pair accuracy rises from about 0.82 to 0.90 as candidate count increases. A red valid-execution line remains at zero.</desc>
  <rect width="720" height="360" fill="white"/>
  <line x1="80" y1="40" x2="80" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="300" x2="680" y2="300" stroke="#333" stroke-width="2"/>
  <text x="360" y="345" text-anchor="middle" font-family="sans-serif" font-size="16">Primitive alternatives shown during training</text>
  <text x="22" y="170" transform="rotate(-90 22 170)" text-anchor="middle" font-family="sans-serif" font-size="16">Diagnostic score</text>
  <polyline points="100,87 230,77 370,83 510,72 650,61" fill="none" stroke="#2563eb" stroke-width="5"/>
  <polyline points="100,300 230,300 370,300 510,300 650,300" fill="none" stroke="#dc2626" stroke-width="5"/>
  <g font-family="sans-serif" font-size="14" text-anchor="middle" fill="#222">
    <text x="100" y="322">4</text><text x="230" y="322">8</text><text x="370" y="322">32</text><text x="510" y="322">64</text><text x="650" y="322">94</text>
  </g>
  <text x="460" y="48" font-family="sans-serif" font-size="15" fill="#2563eb">Held-out pair accuracy</text>
  <text x="450" y="285" font-family="sans-serif" font-size="15" fill="#dc2626">Valid execution: zero</text>
</svg>

