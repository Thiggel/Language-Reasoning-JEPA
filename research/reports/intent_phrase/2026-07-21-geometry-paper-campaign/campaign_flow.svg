<svg xmlns="http://www.w3.org/2000/svg" width="980" height="250" viewBox="0 0 980 250" role="img" aria-labelledby="title desc">
  <title id="title">Gated experiment campaign</title>
  <desc id="desc">Four boxes show process tests leading to dataset validation, then three-seed learning-rate selection, then a five-seed paper estimate.</desc>
  <rect width="980" height="250" fill="#ffffff"/>
  <g font-family="sans-serif" text-anchor="middle">
    <g fill="#e8f1ff" stroke="#315b8a" stroke-width="2">
      <rect x="20" y="70" width="190" height="110" rx="12"/>
      <rect x="270" y="70" width="190" height="110" rx="12"/>
      <rect x="520" y="70" width="190" height="110" rx="12"/>
      <rect x="770" y="70" width="190" height="110" rx="12"/>
    </g>
    <g fill="#18324b" font-size="17">
      <text x="115" y="105"><tspan x="115">1. Process gate</tspan><tspan x="115" dy="25">train, reload, plan</tspan><tspan x="115" dy="25">without an oracle menu</tspan></text>
      <text x="365" y="105"><tspan x="365">2. Dataset gate</tspan><tspan x="365" dy="25">catalogue recall, replay,</tspan><tspan x="365" dy="25">split integrity</tspan></text>
      <text x="615" y="105"><tspan x="615">3. Select learning rate</tspan><tspan x="615" dy="25">9 rates × 3 seeds</tspan><tspan x="615" dy="25">validation mean only</tspan></text>
      <text x="865" y="105"><tspan x="865">4. Paper estimate</tspan><tspan x="865" dy="25">add seeds 3 and 4</tspan><tspan x="865" dy="25">report all 5 seeds</tspan></text>
    </g>
    <g stroke="#315b8a" stroke-width="3" fill="none">
      <path d="M210 125 H265"/><path d="M460 125 H515"/><path d="M710 125 H765"/>
    </g>
    <g fill="#315b8a"><path d="M265 125 l-10 -7 v14z"/><path d="M515 125 l-10 -7 v14z"/><path d="M765 125 l-10 -7 v14z"/></g>
    <text x="490" y="225" fill="#6b2737" font-size="16">A failed gate stops only the affected pathway; it does not become a paper result.</text>
  </g>
</svg>
