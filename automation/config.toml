# Safe checked-in defaults. Copy config.example.toml outside the repository
# before changing policy or enabling Codex wake-ups.

[project]
root = "/vol/home-vol2/ml/laitenbf/TextJEPA"
remote_url = "git@github.com:Thiggel/Language-Reasoning-JEPA.git"

[controller]
state_dir = ".researchctl"
run_root = "runs/autonomy"
plan_path = "research/NEXT_PLAN.json"
stop_file = "research/STOP"
project_registry = "projects"
worktree_root = "/vol/home-vol2/ml/laitenbf/TextJEPA-worktrees"
borrow_grace_minutes = 30

[limits]
max_jobs_per_round = 16
max_gpus_per_job = 2
max_gpu_hours_per_round = 24.0
max_gpu_hours_7d = 120.0
max_active_jobs = 16
max_unreviewed_reports = 1

[storage]
min_free_gb = 100.0
max_used_percent = 90.0
remote_min_free_gb = 100.0
remote_max_used_percent = 90.0
max_retrieved_file_mb = 256
retrieve_patterns = ["*/", "run_summary.json", "resolved_config.json", "environment.json", "metrics.json", "metrics.csv", "*.log", "*.out", "*.err", "*.json", "*.csv", "*.md", "*.png", "*.pdf"]

[codex]
enabled = true
auto_submit_after_wake = false
max_changed_files = 100
max_changed_bytes = 5000000
verification_timeout_seconds = 600
verification_command = [".venv2/bin/python", "automation/verify_oversight.py"]
require_explanatory_report = true
protected_paths = ["AGENTS.md", ".codex", ".agents", "automation", ".gitignore", "research/CHARTER.md", "research/STATE.md", "research/EVIDENCE.md", "research/QUESTION_BACKLOG.md", "research/EXPERIMENT_INDEX.md", "research/DECISIONS.md", "research/SHARED_EVIDENCE.md", "docs/AUTONOMY_SECURITY.md"]
executable = "/vol/home-vol2/ml/laitenbf/.npm-global/bin/codex"
model = "gpt-5.6-sol"
reasoning_effort = "medium"
sandbox = "workspace-write"
prompt = "automation/prompts/oversight.md"

[clusters.gruenau]
kind = "gruenau"
enabled = true
ssh = "laitenbf@gruenau1.informatik.hu-berlin.de"
ssh_template = "laitenbf@gruenau{node}.informatik.hu-berlin.de"
nodes = [1, 2, 7, 8, 9, 10, 11, 12]
project_root = "/vol/home-vol2/ml/laitenbf/TextJEPA"
python = "/vol/home-vol2/ml/laitenbf/TextJEPA/.venv/bin/python"
cache_root = "/vol/home-vol2/ml/laitenbf/.cache/textjepa"
free_memory_used_mb = 100
free_utilization_percent = 5
max_walltime_minutes = 1440
setup = []

[clusters.alex]
kind = "slurm"
enabled = true
ssh = "alex"
project_root = "/home/atuin/c107fa/c107fa12/TextJEPA"
